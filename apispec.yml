openapi: '3.0.3'
info:
  title: Category RESTFul API
  description: API Spec for Category RESTFul API
  version: '1.0'
servers:
  - url: http://localhost:8000/api
paths:
  /categories:
    get:
      security:
        - CategoryAuth: []
      tags:
        - Category API
      description: List of All Categories
      summary: List of All Categories
      responses:
        '200':
          description: Success Get all Categories
          content: 
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  status:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
    post:
      security:
        - CategoryAuth: []
      tags:
        - Category API
      description: Create New Category
      summary: Create New Category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Success Create Category
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  status:
                    type: string
                  data:
                    $ref: '#/components/schemas/Category'
  /categories/{categoryId}:
    get:
      security:
        - CategoryAuth: []
      tags: 
        - Category API
      summary: Get category by Id
      description: Get category by id
      parameters: 
        - name: categoryId
          in: path
          description: Category Id
          required: true
          schema:
            type: string
      responses:
        '200' :
          description: Success get category
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: 
                    type: integer
                  status: 
                    type: string
                  data : 
                    $ref: '#/components/schemas/Category'
    put :
      security: 
        - CategoryAuth: []
      tags: 
        - Category API
      summary: Update category by Id
      description: Update category by Id
      parameters: 
        - name: categoryId
          in: path
          description: Category Id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrUpdateCategory'
      responses:
        '200':
          description: Success get category
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  status :
                    type: string
                  data :
                    $ref: '#/components/schemas/Category'
    delete:
      security: 
        - CategoryAuth: []
      tags: 
        - Category API
      summary: Delete category by Id
      description: Delete category by id
      parameters: 
        - name: categoryId
          in: path
          description: Category Id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success delete category
          content:
            application/json:
              schema:
                type: object
                properties:
                  code :
                    type: integer
                  status :
                    type: string
                    
components:
  securitySchemes:
    CategoryAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Authentication for Category API
  schemas:
    CreateOrUpdateCategory:
      type: object
      properties:
        name:
          type: string
      additionalProperties: false
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

